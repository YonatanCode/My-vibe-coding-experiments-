<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giant Product Card Row</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Overpass:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <div class="plp-tabs" role="tablist" aria-label="Product category">
        <button class="plp-tab is-active" id="tab-bikes" type="button" role="tab" aria-selected="true" aria-controls="card-row" data-tab="bikes">
          Bikes
        </button>
        <button class="plp-tab" id="tab-gear" type="button" role="tab" aria-selected="false" aria-controls="card-row" data-tab="gear">
          Gear
        </button>
      </div>
      <section class="card-row" id="card-row"></section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
